<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Viaje de Cumpleaños - RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #121214;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #status {
            font-size: 10px;
            color: #ffcc00;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.6;
        }

        /* El Mapa del Mundo (Grid de 10x10) */
        #map {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            grid-template-rows: repeat(10, 40px);
            gap: 2px;
            background-color: #222;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            position: relative;
        }

        .cell {
            background-color: #1a1a1e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* Estilos de los elementos del juego */
        .player {
            background-color: #00ff66; /* Tu novio versión pixel */
            border-radius: 4px;
            box-shadow: inset 0 0 8px #000;
        }

        .building {
            border: 2px dashed #ff3363;
            cursor: pointer;
        }

        /* Carteles flotantes para los Regalos/Zonas */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1a1a1e;
            border: 4px solid #fff;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            z-index: 10;
        }

        .modal.active { display: block; }
        .modal h2 { font-size: 14px; color: #ffcc00; margin-bottom: 20px; }
        .modal p { font-size: 10px; line-height: 1.8; }
    </style>
</head>
<body>

    <div id="status">🎮 CONTROL DESCONECTADO<br>Conectá tu 8BitDo Lite 2 o usá las flechas del teclado</div>

    <!-- MAPA DEL JUEGO -->
    <div id="map"></div>

    <!-- MODALES DE HISTORIA / REGALOS -->
    <div id="modal-event" class="modal">
        <h2 id="modal-title">ZONA BLOQUEADA</h2>
        <p id="modal-text">Contenido del evento...</p>
        <button style="font-family:'Press Start 2P'; margin-top:20px; cursor:pointer;" onclick="closeModal()">CERRAR [B]</button>
    </div>

    <script>
        const GRID_SIZE = 10;
        
        // Posición inicial del jugador (X, Y)
        let player = { x: 1, y: 1 };

        // Definición de las "Ciudades / Edificios" en las coordenadas (X, Y)
        const locations = {
            "3,3": { title: "CIUDAD 1: PUEBLO CONTROL", text: "¡Felicidades! Encontraste el primer cofre. Acá desbloqueás tu control 8BitDo Lite 2 en el mundo real. ¡Conectalo ahora para seguir explorando!", icon: "🕹️" },
            "7,4": { title: "CIUDAD 2: DISTRITO TABLET", text: "Estás en el centro multimedia. Para proteger tu pantalla de analista de anime, ganaste la funda Origami para tu Xiaomi Pad 6. (Inserte poema/foto aquí)", icon: "📁" },
            "5,8": { title: "CIUDAD 3: ARENA BEYBLADE", text: "¡El clímax del torneo! Derrotaste al jefe final. Tu recompensa son 2 Beyblades listos para la batalla en el mundo real. ¡Feliz Cumpleaños!", icon: "🌪️" }
        };

        // Generar el mapa visualmente en el HTML
        function drawMap() {
            const mapContainer = document.getElementById('map');
            mapContainer.innerHTML = '';

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    // Verificar si es la posición del jugador
                    if (x === player.x && y === player.y) {
                        cell.classList.add('player');
                        cell.innerText = "👦";
                    } 
                    // Verificar si hay un edificio en esta coordenada
                    else if (locations[`${x},${y}`]) {
                        cell.classList.add('building');
                        cell.innerText = locations[`${x},${y}`].icon;
                    }
                    
                    mapContainer.appendChild(cell);
                }
            }
        }

        // Lógica de movimiento y verificación de colisión con eventos
        function move(dx, dy) {
            let newX = player.x + dx;
            let newY = player.y + dy;

            // Evitar que se salga de los bordes del mapa
            if (newX >= 0 && newX < GRID_SIZE && newY >= 0 && newY < GRID_SIZE) {
                player.x = newX;
                player.y = newY;
                drawMap();
                checkEvent(newX, newY);
            }
        }

        function checkEvent(x, y) {
            const loc = locations[`${x},${y}`];
            if (loc) {
                document.getElementById('modal-title').innerText = loc.title;
                document.getElementById('modal-text').innerText = loc.text;
                document.getElementById('modal-event').classList.add('active');
            }
        }

        function closeModal() {
            document.getElementById('modal-event').classList.remove('active');
        }

        // --- ENTRADA 1: Teclado convencional (Por si acaso) ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') move(0, -1);
            if (e.key === 'ArrowDown') move(0, 1);
            if (e.key === 'ArrowLeft') move(-1, 0);
            if (e.key === 'ArrowRight') move(1, 0);
        });

        // --- ENTRADA 2: Gamepad API (El Control 8BitDo) ---
        let gamepadIndex = null;
        let lastInputTime = 0;

        window.addEventListener("gamepadconnected", (e) => {
            gamepadIndex = e.gamepad.index;
            document.getElementById('status').innerHTML = "🎮 ¡8BITDO DETECTADO!<br>Usá la cruz (D-Pad) para mover al personaje.";
            rpgLoop();
        });

        window.addEventListener("gamepaddisconnected", () => {
            gamepadIndex = null;
            document.getElementById('status').innerText = "❌ CONTROL DESCONECTADO";
        });

        function rpgLoop() {
            if (gamepadIndex === null) return;
            const gp = navigator.getGamepads()[gamepadIndex];
            const now = performance.now();

            // Evitar que el personaje se mueva a la velocidad de la luz (Cooldown de 200ms)
            if (now - lastInputTime > 200) {
                // Mapeo estándar de la cruz dirección (D-Pad)
                if (gp.buttons[12].pressed) { move(0, -1); lastInputTime = now; } // Arriba
                if (gp.buttons[13].pressed) { move(0, 1);  lastInputTime = now; } // Abajo
                if (gp.buttons[14].pressed) { move(-1, 0); lastInputTime = now; } // Izquierda
                if (gp.buttons[15].pressed) { move(1, 0);  lastInputTime = now; } // Derecha

                // Botón B (Mapeo estándar suele ser botón 0 o 1) para cerrar carteles
                if (gp.buttons[0].pressed || gp.buttons[1].pressed) {
                    closeModal();
                    lastInputTime = now;
                }
            }

            requestAnimationFrame(rpgLoop);
        }

        // Iniciar el mapa por primera vez
        drawMap();
    </script>
</body>
</html>
