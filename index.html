<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PokéAventura · Los regalos de tu amor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #1a2a1f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
            transition: all 0.3s;
        }

        /* Contenedor principal */
        .game-wrapper {
            background: #2e2b26;
            border-radius: 48px;
            padding: 16px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            display: inline-block;
        }

        /* Canvas: área de juego */
        .canvas-container {
            position: relative;
            display: inline-block;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            cursor: pointer;
            background-color: #6b8c5c;
            width: 100%;
            height: auto;
            max-width: 900px;
            aspect-ratio: 900 / 550;
        }

        /* Panel de información y diálogo */
        .info-panel {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fcf3da;
            border-radius: 40px;
            padding: 12px 20px;
            border: 2px solid #c9a96b;
        }

        .badge {
            background: #2c2b26;
            color: #ffdf8c;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
        }

        .dialog {
            flex: 1;
            margin: 0 16px;
            font-size: 14px;
            font-weight: bold;
            color: #3a2a1f;
            background: #fff3e0;
            padding: 10px 16px;
            border-radius: 30px;
            font-family: monospace;
        }

        /* Controles táctiles (flechas) */
        .touch-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            transition: opacity 0.3s;
        }

        .ctrl-btn {
            background: #3a3a3a;
            border: none;
            font-size: 32px;
            padding: 16px 24px;
            border-radius: 60px;
            color: white;
            box-shadow: 0 6px 0 #1a1a1a;
            cursor: pointer;
            transition: 0.05s linear;
            font-weight: bold;
            touch-action: manipulation;
        }

        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1a1a1a;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
        }

        .pixel-btn {
            background: #f5bc70;
            border: none;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b46f2a;
            transition: 0.05s linear;
        }

        .pixel-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b46f2a;
        }

        /* Pop-up modal para poemas / mensajes */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            font-family: monospace;
        }
        .modal-content {
            background: #fff3cf;
            max-width: 80%;
            padding: 24px;
            border-radius: 32px;
            border: 4px solid #ffcd7e;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #2c2b1f;
        }
        .modal-content button {
            margin-top: 20px;
            background: #6fcf97;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* Pantalla completa */
        .fullscreen canvas {
            max-width: 100vw;
            max-height: 100vh;
            border-radius: 0;
        }
        .fullscreen .touch-controls,
        .fullscreen .info-panel,
        .fullscreen .action-buttons {
            display: none;
        }
        .fullscreen .game-wrapper {
            background: transparent;
            padding: 0;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="gameWrapper">
    <div class="canvas-container">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
    </div>
    <div class="info-panel">
        <div class="badge" id="dayBadge">📅 DÍA 1</div>
        <div class="dialog" id="dialogBox">✨ Acércate a los objetos ✨</div>
        <div class="badge" id="giftBadge">🎁 REGALO: ?</div>
    </div>
    <div class="touch-controls" id="touchControls">
        <button class="ctrl-btn" id="btnUp">▲</button>
        <button class="ctrl-btn" id="btnLeft">◀</button>
        <button class="ctrl-btn" id="btnDown">▼</button>
        <button class="ctrl-btn" id="btnRight">▶</button>
    </div>
    <div class="action-buttons">
        <button class="pixel-btn" id="resetBtn">🔁 REINICIAR</button>
        <button class="pixel-btn" id="nextDayBtn">🌙 PASAR DÍA</button>
        <button class="pixel-btn" id="controlConnectedBtn">🎮 CONTROL CONECTADO</button>
    </div>
</div>

<script>
    // ==========================================================
    //  JUEGO CON IMÁGENES REALES (PLACEHOLDER)
    //  Movimiento libre, detección por proximidad, pop-ups.
    // ==========================================================
    
    // ---------- CONFIGURACIÓN DE ESCENAS Y OBJETOS ----------
    // Cada escena tiene un fondo y una lista de objetos interactuables.
    // Los objetos tienen: nombre, x, y, radio, mensaje (poema/foto)
    
    const ESCENAS = {
        1: {   // Día 1: cama (mensaje del control)
            fondo: "https://cdn.pixabay.com/photo/2016/11/19/14/00/bedroom-1835921_1280.jpg",
            objetos: [
                { nombre: "📱 Mensaje del juego", x: 450, y: 400, radio: 50, 
                  mensaje: "⚠️ ¡Para una mejor experiencia, conecta tu control! ⚠️\n(Usa el botón 'Control conectado' para simularlo)" }
            ],
            personajeInicio: { x: 450, y: 480 }
        },
        2: {   // Día 2: casa con recuerdos
            fondo: "https://cdn.pixabay.com/photo/2017/08/06/12/06/living-room-2591714_1280.jpg",
            objetos: [
                { nombre: "📚 Estante", x: 200, y: 300, radio: 60,
                  mensaje: "📜 Poema: 'Tus manos abren cada libro de mi vida'.\n🖼️ Foto: ustedes leyendo juntos." },
                { nombre: "🪴 Planta", x: 700, y: 420, radio: 50,
                  mensaje: "🌱 'Como esta planta, nuestro amor florece cada día'.\n📸 Recuerdo: regando la maceta." },
                { nombre: "🖼️ Cuadro", x: 500, y: 200, radio: 55,
                  mensaje: "🖼️ Nuestra primera foto. ¡Qué felices!\n💌 Te quiero más cada día." }
            ],
            personajeInicio: { x: 450, y: 500 }
        },
        3: {   // Día 3: calle + esquina
            fondo: "https://cdn.pixabay.com/photo/2016/11/29/13/04/street-1868688_1280.jpg",
            objetos: [
                { nombre: "🌳 Árbol", x: 180, y: 380, radio: 65,
                  mensaje: "🍃 Poema: 'Bajo este árbol contamos secretos al viento'.\n📸 Foto: sentados en la piedra." },
                { nombre: "💡 Farol", x: 750, y: 300, radio: 55,
                  mensaje: "🏮 'Cada tarde te esperaba aquí, farol testigo de nuestro amor'." },
                { nombre: "⭐ Piedra del regalo", x: 450, y: 490, radio: 60,
                  mensaje: "🎁 ¡SEGUNDO REGALO! 🎁\nUna BEYBLADE + funda para tablet.\n💝 ¡Felicidades, amor!" }
            ],
            personajeInicio: { x: 450, y: 520 }
        }
    };
    
    // Estado del juego
    let currentDay = 1;          // 1,2,3
    let player = { x: 450, y: 480 };
    let surpriseDone = false;    // si ya vio el mensaje del control (día1)
    let objetosVisitados = { 2: [], 3: [] }; // guardar IDs visitados
    let currentScene = null;
    
    // Imágenes y canvas
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let bgImage = new Image();
    let characterImg = new Image();
    
    // Cargar sprite del personaje (placeholder libre)
    characterImg.src = "https://cdn-icons-png.flaticon.com/512/1995/1995572.png"; // chico aventurero
    
    // Variables para movimiento
    let moveLeft = false, moveRight = false, moveUp = false, moveDown = false;
    let lastTimestamp = 0;
    
    // Pop-up
    let activeModal = null;
    
    // Control conectado
    let controlConnected = false;
    
    // DOM elements
    const dayBadge = document.getElementById('dayBadge');
    const giftBadge = document.getElementById('giftBadge');
    const dialogBox = document.getElementById('dialogBox');
    const touchControlsDiv = document.getElementById('touchControls');
    const gameWrapper = document.getElementById('gameWrapper');
    
    // ---------- FUNCIONES ----------
    function loadScene(day) {
        currentScene = ESCENAS[day];
        if (!currentScene) return;
        bgImage.src = currentScene.fondo;
        // Posición inicial del personaje
        player.x = currentScene.personajeInicio.x;
        player.y = currentScene.personajeInicio.y;
        // Inicializar visitados para este día
        if (!objetosVisitados[day]) objetosVisitados[day] = [];
        // Actualizar UI
        updateUI();
        draw();
    }
    
    function updateUI() {
        dayBadge.innerText = `📅 DÍA ${currentDay}`;
        if (currentDay === 1 && !surpriseDone) giftBadge.innerText = "🎁 CONTROL SORPRESA";
        else if (currentDay === 2) giftBadge.innerText = `🏠 Recuerdos: ${objetosVisitados[2]?.length || 0}/${ESCENAS[2].objetos.length}`;
        else if (currentDay === 3) giftBadge.innerText = `⭐ Regalo: ${objetosVisitados[3]?.some(o => o === "⭐ Piedra del regalo") ? "OBTENIDO" : "Pendiente"}`;
        else giftBadge.innerText = "✨ Completado ✨";
        
        // Mensaje flotante de proximidad
        let nearObj = getNearbyObject();
        if (nearObj && !controlConnected && currentDay === 1 && !surpriseDone) {
            dialogBox.innerText = `🔍 Cerca de: ${nearObj.nombre}. ¡Haz clic en el objeto!`;
        } else if (nearObj && currentDay !== 1) {
            dialogBox.innerText = `🔍 Cerca de: ${nearObj.nombre}. ¡Toca el objeto para tu recuerdo!`;
        } else {
            dialogBox.innerText = "💬 Muévete con las flechas y acércate a los objetos brillantes.";
        }
    }
    
    // Detectar objeto más cercano dentro del radio
    function getNearbyObject() {
        if (!currentScene) return null;
        for (let obj of currentScene.objetos) {
            const dx = player.x - obj.x;
            const dy = player.y - obj.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < obj.radio) return obj;
        }
        return null;
    }
    
    // Manejar clic en el canvas: si hay un objeto cerca, mostrar pop-up
    function handleCanvasClick(e) {
        const nearby = getNearbyObject();
        if (!nearby) {
            if (currentDay === 1 && !surpriseDone) {
                dialogBox.innerText = "Acércate al mensaje del juego (centro de la habitación) para conectar el control.";
            } else {
                dialogBox.innerText = "Acércate a un objeto brillante para interactuar.";
            }
            return;
        }
        
        // Caso especial día 1: mensaje del control
        if (currentDay === 1 && !surpriseDone) {
            showModal("🎮 SORPRESA 🎮\n\n¡Mira a tu lado! ¡Aquí está tu control 8bitdo!\n(Simula que se lo entregas en la vida real)\n\nAhora puedes conectar el control con el botón azul.", () => {
                surpriseDone = true;
                saveGame();
                updateUI();
                draw();
            });
            return;
        }
        
        // Días 2 y 3: mostrar poema/foto
        if (currentDay === 2 || currentDay === 3) {
            // Verificar si ya lo había visto
            const yaVisto = objetosVisitados[currentDay]?.includes(nearby.nombre);
            if (!yaVisto) {
                objetosVisitados[currentDay].push(nearby.nombre);
                saveGame();
            }
            showModal(nearby.mensaje, null);
            updateUI();
            draw();
        }
    }
    
    function showModal(text, onClose) {
        if (activeModal) activeModal.remove();
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <p style="white-space: pre-line;">${text}</p>
                <button id="closeModalBtn">Cerrar</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        activeModal = modalDiv;
        document.getElementById('closeModalBtn').onclick = () => {
            modalDiv.remove();
            activeModal = null;
            if (onClose) onClose();
        };
    }
    
    // Movimiento del personaje
    function updateMovement() {
        let speed = 3.5;
        let newX = player.x;
        let newY = player.y;
        if (moveLeft) newX -= speed;
        if (moveRight) newX += speed;
        if (moveUp) newY -= speed;
        if (moveDown) newY += speed;
        // límites del canvas (márgenes para no salirse)
        newX = Math.min(Math.max(newX, 40), canvas.width - 40);
        newY = Math.min(Math.max(newY, 50), canvas.height - 50);
        player.x = newX;
        player.y = newY;
        draw();
        updateUI();
    }
    
    // Dibujar todo
    function draw() {
        if (!bgImage.complete || bgImage.naturalWidth === 0) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Fondo
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
        
        // Dibujar objetos interactivos con un resplandor simple
        if (currentScene) {
            for (let obj of currentScene.objetos) {
                // Círculo de interacción
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.radio, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255, 215, 0, 0.3)";
                ctx.fill();
                ctx.strokeStyle = "#ffaa33";
                ctx.lineWidth = 2;
                ctx.stroke();
                // Nombre
                ctx.font = "bold 14px monospace";
                ctx.fillStyle = "#ffffff";
                ctx.shadowBlur = 4;
                ctx.fillText(obj.nombre, obj.x-25, obj.y-15);
                ctx.shadowBlur = 0;
            }
        }
        
        // Dibujar personaje
        if (characterImg.complete && characterImg.naturalWidth > 0) {
            ctx.drawImage(characterImg, player.x-25, player.y-35, 50, 50);
        } else {
            ctx.fillStyle = "#ff9966";
            ctx.fillRect(player.x-15, player.y-30, 30, 40);
        }
        
        // Si control conectado, dibujar un indicador
        if (controlConnected) {
            ctx.font = "bold 20px monospace";
            ctx.fillStyle = "#00ffcc";
            ctx.shadowBlur = 0;
            ctx.fillText("🎮 CONTROL CONECTADO", 20, 50);
        }
    }
    
    // Cambiar a pantalla completa y ocultar controles táctiles
    function enableControlMode() {
        controlConnected = true;
        touchControlsDiv.style.display = "none";
        // Pantalla completa
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }
        gameWrapper.classList.add('fullscreen');
        dialogBox.innerText = "🎮 Modo control activado. ¡Disfruta la experiencia!";
        updateUI();
        draw();
    }
    
    // Avanzar de día (regalo real)
    function nextDay() {
        if (currentDay === 1 && !surpriseDone) {
            showModal("Primero debes recibir la sorpresa del control. Acércate al mensaje en la habitación y haz clic.", null);
            return;
        }
        if (currentDay === 2 && objetosVisitados[2]?.length < ESCENAS[2].objetos.length) {
            showModal("Aún no has encontrado todos los recuerdos de la casa. Explora y toca los objetos brillantes.", null);
            return;
        }
        if (currentDay === 3 && !objetosVisitados[3]?.includes("⭐ Piedra del regalo")) {
            showModal("Debes reclamar el segundo regalo en la piedra de la esquina. Acércate y tócala.", null);
            return;
        }
        
        if (currentDay === 1 && surpriseDone) {
            currentDay = 2;
            loadScene(2);
            saveGame();
            showModal("🌅 ¡Día 2! Ahora explora tu casa. Acércate a los objetos para descubrir poemas y fotos.", null);
        } else if (currentDay === 2 && objetosVisitados[2]?.length >= ESCENAS[2].objetos.length) {
            currentDay = 3;
            loadScene(3);
            saveGame();
            showModal("🚪 Sales de casa. Llegarás a la esquina donde solían sentarse. Busca la piedra para tu segundo regalo.", null);
        } else if (currentDay === 3 && objetosVisitados[3]?.includes("⭐ Piedra del regalo")) {
            showModal("🎉 ¡FELICIDADES! Has completado todos los regalos. 🎉\nGracias por jugar. ¡Te quiero muchísimo!", null);
            // Aquí podrías bloquear más avances
        }
        updateUI();
        draw();
    }
    
    // Guardar progreso
    function saveGame() {
        const save = {
            currentDay,
            surpriseDone,
            objetosVisitados,
            playerPos: { x: player.x, y: player.y }
        };
        localStorage.setItem('pokemonAmorSave', JSON.stringify(save));
    }
    
    function loadGame() {
        const data = localStorage.getItem('pokemonAmorSave');
        if (data) {
            try {
                const saved = JSON.parse(data);
                currentDay = saved.currentDay;
                surpriseDone = saved.surpriseDone;
                objetosVisitados = saved.objetosVisitados || { 2: [], 3: [] };
                if (saved.playerPos) {
                    player.x = saved.playerPos.x;
                    player.y = saved.playerPos.y;
                }
                loadScene(currentDay);
            } catch(e) {}
        } else {
            loadScene(1);
        }
        updateUI();
    }
    
    function resetGame() {
        localStorage.removeItem('pokemonAmorSave');
        currentDay = 1;
        surpriseDone = false;
        objetosVisitados = { 2: [], 3: [] };
        controlConnected = false;
        touchControlsDiv.style.display = "flex";
        gameWrapper.classList.remove('fullscreen');
        if (document.fullscreenElement) document.exitFullscreen();
        loadScene(1);
        updateUI();
        draw();
    }
    
    // Eventos de movimiento táctil / ratón
    function attachControls() {
        document.getElementById('btnUp').addEventListener('mousedown', () => moveUp=true);
        document.getElementById('btnUp').addEventListener('mouseup', () => moveUp=false);
        document.getElementById('btnUp').addEventListener('touchstart', (e) => { e.preventDefault(); moveUp=true; });
        document.getElementById('btnUp').addEventListener('touchend', () => moveUp=false);
        
        document.getElementById('btnDown').addEventListener('mousedown', () => moveDown=true);
        document.getElementById('btnDown').addEventListener('mouseup', () => moveDown=false);
        document.getElementById('btnDown').addEventListener('touchstart', (e) => { e.preventDefault(); moveDown=true; });
        document.getElementById('btnDown').addEventListener('touchend', () => moveDown=false);
        
        document.getElementById('btnLeft').addEventListener('mousedown', () => moveLeft=true);
        document.getElementById('btnLeft').addEventListener('mouseup', () => moveLeft=false);
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft=true; });
        document.getElementById('btnLeft').addEventListener('touchend', () => moveLeft=false);
        
        document.getElementById('btnRight').addEventListener('mousedown', () => moveRight=true);
        document.getElementById('btnRight').addEventListener('mouseup', () => moveRight=false);
        document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight=true; });
        document.getElementById('btnRight').addEventListener('touchend', () => moveRight=false);
        
        // Bucle de movimiento
        setInterval(() => { updateMovement(); }, 25);
    }
    
    // Eventos globales
    canvas.addEventListener('click', handleCanvasClick);
    document.getElementById('resetBtn').addEventListener('click', resetGame);
    document.getElementById('nextDayBtn').addEventListener('click', nextDay);
    document.getElementById('controlConnectedBtn').addEventListener('click', enableControlMode);
    
    // Iniciar
    attachControls();
    loadGame();
    bgImage.onload = () => draw();
    characterImg.onload = () => draw();
</script>
</body>
</html>
