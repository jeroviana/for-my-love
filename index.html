<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PokéAventura · Los regalos de tu amor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #2b3b2c 0%, #1d2a1e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 20px;
        }

        /* Fuente retro */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* Contenedor principal estilo GameBoy Advance */
        .gameboy {
            background: #302d28;
            border-radius: 32px;
            padding: 20px 20px 24px;
            box-shadow: 0 16px 28px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid #5e5b55;
        }

        .screen {
            background: #a8d08d;
            border-radius: 20px;
            padding: 12px;
            box-shadow: inset 0 0 0 3px #4a6741, 0 8px 0 #2c3e2b;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: pixelated;
            background-color: #84b36b;
            cursor: pointer;
            width: 100%;
            height: auto;
            max-width: 720px;
            aspect-ratio: 720 / 400;
        }

        /* Panel de diálogo tipo Pokémon */
        .dialog-panel {
            background: #f9f3e2;
            border-radius: 24px;
            margin-top: 18px;
            padding: 16px 20px;
            border: 3px solid #4a3920;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.1), 0 4px 0 #836e4a;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            line-height: 1.5;
            color: #2c2b26;
            text-shadow: 1px 1px 0px rgba(255,255,200,0.8);
            letter-spacing: 0.5px;
        }

        .button-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* Botones con estilo Nintendo */
        .pixel-btn {
            background: #f5bc70;
            border: none;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            padding: 10px 20px;
            border-radius: 40px;
            color: #2d2418;
            box-shadow: 0 5px 0 #b46f2a;
            cursor: pointer;
            transition: 0.05s linear;
            font-weight: bold;
        }

        .pixel-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b46f2a;
        }

        .btn-primary {
            background: #6fcf97;
            box-shadow: 0 5px 0 #2c6e4f;
            color: #1e3a2f;
        }

        .btn-danger {
            background: #e67e5c;
            box-shadow: 0 5px 0 #a33f22;
            color: white;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
            padding: 0 8px;
        }

        .badge {
            background: #2c2b26;
            color: #ffe484;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 9px;
            font-family: 'Press Start 2P', monospace;
            box-shadow: inset 0 0 0 1px #ffdf8c, 0 2px 0 #00000055;
        }

        /* Overlay de SORPRESA con estilo épico */
        .surprise-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ff2266, #220000);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 2000;
            font-family: 'Press Start 2P', monospace;
            animation: flicker 0.2s infinite;
        }

        .surprise-text {
            font-size: 56px;
            color: #fff44f;
            text-shadow: 8px 8px 0 #d40000;
            letter-spacing: 8px;
            animation: bounce 0.4s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); text-shadow: 12px 12px 0 #a10000; }
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            100% { opacity: 1; background: radial-gradient(circle, #ff3366, #330000); }
        }

        .close-surprise {
            background: #ffde9c;
            border: none;
            padding: 12px 28px;
            font-size: 14px;
            margin-top: 40px;
            border-radius: 60px;
            font-family: 'Press Start 2P', monospace;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="gameboy">
    <div class="info-bar">
        <div class="badge" id="dayBadge">📅 DÍA 1</div>
        <div class="badge" id="giftBadge">🎁 REGALO: ??</div>
    </div>
    <div class="screen">
        <canvas id="gameCanvas" width="720" height="400"></canvas>
    </div>
    <div class="dialog-panel" id="dialogBox">
        💬 ¡Bienvenido, aventurero! Toque los objetos brillantes ✨
    </div>
    <div class="button-bar">
        <button class="pixel-btn btn-danger" id="resetBtn">🔁 REINICIAR</button>
        <button class="pixel-btn btn-primary" id="nextDayBtn">🌙 PASAR DÍA / REGALO</button>
    </div>
</div>

<script>
    // ============================================================
    //  🎮 JUEGO CON ESTÉTICA POKÉMON MEJORADA 💖
    // ============================================================
    
    // -------- CONFIGURACIÓN DE RECUERDOS (cámbialos con amor) --------
    const CASA_RECUERDOS = [
        { nombre: "📖 Librero", x: 100, y: 200, w: 70, h: 90, 
          mensaje: "📜 *Poema encontrado*:\n“Tus manos dibujan el sol en mi espalda, cada día es un verso nuevo.”\n🖼️ [Foto: ustedes leyendo en el sofá]" },
        { nombre: "🪴 Planta del amor", x: 580, y: 250, w: 50, h: 70,
          mensaje: "🌱 Esta planta creció con nuestras conversaciones.\n🎵 *Poema*: “Raíces como las nuestras, que florecen incluso en invierno.”\n📸 Foto: regando juntos" },
        { nombre: "🖼️ Cuadro de la risa", x: 380, y: 140, w: 80, h: 80,
          mensaje: "🖼️ ¡Nuestra primera foto juntos! Qué nervios.\n💌 “Ese día supe que quería contagiarme de tu risa para siempre.”" }
    ];

    const CALLE_RECUERDOS = [
        { nombre: "🌳 Árbol amigo", x: 130, y: 190, w: 70, h: 100,
          mensaje: "🍃 *Poema del árbol*:\n“Bajo tu sombra hicimos promesas de madrugada, el viento las guardó para siempre.”\n📸 [Foto: sentados en la piedra con el árbol atrás]" },
        { nombre: "💡 Farol de espera", x: 520, y: 170, w: 45, h: 100,
          mensaje: "🏮 Aquí te esperaba cada tarde, con una flor en la mano.\n✨ “Tus pasos siempre fueron mi melodía favorita.”" }
    ];

    const REGALO_PIEDRA = "🎁 ¡Llegaste a nuestra PIEDRA MÁGICA! 🎁\n\n⭐ Reclama tu SEGUNDO REGALO ⭐\n¡Una BEYBLADE + la funda para tu tablet!\n\n💝 Te mereces todo esto y más. ¡Te quiero mucho! 💝";

    // -------- ESTADO DEL JUEGO --------
    let gameState = {
        dia: 1,               // 1: cama, 2: casa, 3: calle, 4: final
        sorpresaHecha: false,
        casaVisitados: 0,
        piedraRegaloTomado: false,
        calleVisitados: 0
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const dialogDiv = document.getElementById('dialogBox');
    const dayBadge = document.getElementById('dayBadge');
    const giftBadge = document.getElementById('giftBadge');

    // Guardar/cargar con localStorage
    function guardarPartida() {
        localStorage.setItem('pokemonAmor', JSON.stringify(gameState));
    }

    function cargarPartida() {
        const data = localStorage.getItem('pokemonAmor');
        if (data) {
            try {
                const loaded = JSON.parse(data);
                gameState = loaded;
                // Sincronizar estados visitados de objetos
                CASA_RECUERDOS.forEach((item, idx) => item.visitado = idx < gameState.casaVisitados);
                CALLE_RECUERDOS.forEach((item, idx) => item.visitado = idx < gameState.calleVisitados);
                if (gameState.dia > 3) gameState.dia = 4;
            } catch(e) {}
        } else {
            resetInterno(false);
        }
        actualizarUI();
    }

    function resetInterno(guardar = true) {
        gameState = {
            dia: 1,
            sorpresaHecha: false,
            casaVisitados: 0,
            piedraRegaloTomado: false,
            calleVisitados: 0
        };
        CASA_RECUERDOS.forEach(i => i.visitado = false);
        CALLE_RECUERDOS.forEach(i => i.visitado = false);
        if (guardar) guardarPartida();
        actualizarUI();
        dibujarEscena();
    }

    function actualizarUI() {
        if (gameState.dia === 1) dayBadge.innerText = "📅 DÍA 1 · SORPRESA";
        else if (gameState.dia === 2) dayBadge.innerText = "📅 DÍA 2 · EXPLORA CASA";
        else if (gameState.dia === 3) dayBadge.innerText = "📅 DÍA 3 · CALLE Y ESQUINA";
        else dayBadge.innerText = "🏁 AVENTURA COMPLETA";

        if (gameState.dia === 1 && !gameState.sorpresaHecha) giftBadge.innerText = "🎁 ¡CONTROL SORPRESA!";
        else if (gameState.dia === 2) giftBadge.innerText = `🏠 Recuerdos: ${gameState.casaVisitados}/${CASA_RECUERDOS.length}`;
        else if (gameState.dia === 3) giftBadge.innerText = gameState.piedraRegaloTomado ? "🎁 2º REGALO OBTENIDO" : "⛰️ Toca la piedra";
        else giftBadge.innerText = "✨ ¡Misión cumplida! ✨";
        
        dibujarEscena();
        // Mostrar/ocultar botón sorpresa
        manejarBotonSorpresa();
    }

    function manejarBotonSorpresa() {
        let btnExistente = document.getElementById('sorpresaBtn');
        if (gameState.dia === 1 && !gameState.sorpresaHecha) {
            if (!btnExistente) {
                const boton = document.createElement('button');
                boton.id = 'sorpresaBtn';
                boton.className = 'pixel-btn';
                boton.style.background = "#ff8c5a";
                boton.style.boxShadow = "0 5px 0 #aa4422";
                boton.innerHTML = "🎮 ¡NO TENGO UN CONTROL!";
                boton.onclick = mostrarSorpresaControl;
                const barra = document.querySelector('.button-bar');
                barra.insertBefore(boton, document.getElementById('nextDayBtn'));
            }
        } else {
            if (btnExistente) btnExistente.remove();
        }
    }

    function mostrarSorpresaControl() {
        const overlay = document.createElement('div');
        overlay.className = 'surprise-modal';
        overlay.innerHTML = `
            <div class="surprise-text">¡SORPRESA!</div>
            <div style="color:#ffdd99; margin-top:20px;">✨ ¡Mira hacia un lado, amor! ✨</div>
            <div style="color:#fff; margin-top:10px;">🎁 ¡Aquí está tu controlcito 8bitdo! 🎁</div>
            <button class="close-surprise" id="cerrarSorpresa">Continuar aventura ➡️</button>
        `;
        document.body.appendChild(overlay);
        document.getElementById('cerrarSorpresa').onclick = () => {
            overlay.remove();
            gameState.sorpresaHecha = true;
            guardarPartida();
            dialogDiv.innerHTML = "💖 ¡Control entregado! Ahora puedes terminar el día y mañana explorar la casa llena de recuerdos. 💖";
            actualizarUI();
        };
    }

    // -------------------- DIBUJOS ESTILO POKÉMON MEJORADO --------------------
    function dibujarEscena() {
        ctx.clearRect(0, 0, 720, 400);
        
        if (gameState.dia === 1 && !gameState.sorpresaHecha) {
            dibujarHabitacionCama();
            dibujarPersonaje(360, 310, "dormido");
            dialogDiv.innerHTML = "💤 Estás en la cama... Aparece un mensaje:\n⚠️ “Para una mejor experiencia, conecta tu control” ⚠️";
            return;
        }
        if (gameState.dia === 2) {
            dibujarInteriorCasa();
            dibujarPersonaje(360, 330, "normal");
            CASA_RECUERDOS.forEach(item => {
                ctx.fillStyle = "rgba(255, 215, 120, 0.5)";
                ctx.fillRect(item.x, item.y, item.w, item.h);
                ctx.strokeStyle = "#f7d44a";
                ctx.lineWidth = 2.5;
                ctx.strokeRect(item.x, item.y, item.w, item.h);
                ctx.fillStyle = "#2f2e2a";
                ctx.font = "9px 'Press Start 2P'";
                ctx.fillText(item.nombre, item.x+5, item.y-6);
            });
            return;
        }
        if (gameState.dia === 3) {
            dibujarCalleYEsquina();
            dibujarPersonaje(360, 330, "caminando");
            CALLE_RECUERDOS.forEach(item => {
                ctx.fillStyle = "rgba(80, 180, 255, 0.4)";
                ctx.fillRect(item.x, item.y, item.w, item.h);
                ctx.strokeStyle = "#bbe2ff";
                ctx.strokeRect(item.x, item.y, item.w, item.h);
                ctx.fillStyle = "#2c2c1e";
                ctx.font = "8px 'Press Start 2P'";
                ctx.fillText(item.nombre, item.x+4, item.y-5);
            });
            // Piedra especial
            if (!gameState.piedraRegaloTomado) {
                ctx.fillStyle = "#ffb347";
                ctx.beginPath();
                ctx.ellipse(635, 335, 38, 22, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ffffff";
                ctx.shadowBlur = 0;
                ctx.font = "10px 'Press Start 2P'";
                ctx.fillText("⭐ PIEDRA DEL RECUERDO ⭐", 570, 310);
                ctx.fillStyle = "#ffefb0";
                ctx.font = "8px monospace";
                ctx.fillText("✨ Haz click ✨", 615, 355);
            } else {
                ctx.fillStyle = "#9b7e64";
                ctx.beginPath();
                ctx.ellipse(635, 335, 35, 18, 0, 0, Math.PI*2);
                ctx.fill();
            }
            return;
        }
        // final
        dibujarFinal();
    }

    function dibujarHabitacionCama() {
        ctx.fillStyle = "#3c2b1f";
        ctx.fillRect(0, 0, 720, 400);
        ctx.fillStyle = "#ad8b67";
        ctx.fillRect(0, 280, 720, 120);
        // cama detallada
        ctx.fillStyle = "#5e4233";
        ctx.fillRect(100, 200, 200, 100);
        ctx.fillStyle = "#c99e6f";
        ctx.fillRect(110, 185, 180, 25);
        ctx.fillStyle = "#e5caa4";
        ctx.fillRect(120, 215, 80, 30);
        // ventana
        ctx.fillStyle = "#87CEEB";
        ctx.fillRect(550, 80, 100, 100);
        ctx.fillStyle = "#d4b68a";
        ctx.fillRect(560, 90, 80, 80);
        ctx.fillStyle = "#fbe8c8";
        ctx.font = "12px 'Press Start 2P'";
        ctx.fillText("🛏️", 140, 260);
    }

    function dibujarInteriorCasa() {
        ctx.fillStyle = "#dfcca6";
        ctx.fillRect(0, 0, 720, 400);
        ctx.fillStyle = "#bb9b6e";
        ctx.fillRect(0, 310, 720, 90);
        // muebles simpáticos
        ctx.fillStyle = "#cb9e6b";
        ctx.fillRect(20, 210, 100, 120);
        ctx.fillStyle = "#9cb068";
        ctx.fillRect(620, 230, 80, 100);
        ctx.fillStyle = "#d6b576";
        ctx.fillRect(280, 260, 130, 70);
        // cuadros y decoración
        ctx.fillStyle = "#f5e3c1";
        ctx.fillRect(460, 100, 80, 60);
        ctx.fillStyle = "#00000033";
        ctx.fillRect(475, 115, 50, 30);
        ctx.fillStyle = "#f3cf7a";
        ctx.font = "16px monospace";
        ctx.fillText("🏡 Hogar", 330, 60);
    }

    function dibujarCalleYEsquina() {
        ctx.fillStyle = "#6f9e4f";
        ctx.fillRect(0, 0, 720, 400);
        ctx.fillStyle = "#c9ae7a";
        ctx.fillRect(0, 310, 720, 40);
        ctx.fillStyle = "#4e6b2f";
        for(let i=0;i<6;i++) ctx.fillRect(40+i*110, 220, 25, 70);
        ctx.fillStyle = "#e4c27a";
        ctx.beginPath();
        ctx.ellipse(635, 335, 35, 18, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#ffffffb3";
        ctx.font = "9px 'Press Start 2P'";
        ctx.fillText("🌇 Nuestra esquina", 520, 290);
    }

    function dibujarFinal() {
        ctx.fillStyle = "#14211f";
        ctx.fillRect(0,0,720,400);
        ctx.fillStyle = "#ffd966";
        ctx.font = "18px 'Press Start 2P'";
        ctx.fillText("🌟 ¡FELICIDADES! 🌟", 210, 180);
        ctx.fillStyle = "#f0e6a0";
        ctx.font = "12px monospace";
        ctx.fillText("Has recibido todos los regalos", 210, 250);
        ctx.fillText("Te amo más que a un Pokémon shiny", 190, 310);
    }

    function dibujarPersonaje(x, y, anim) {
        // Personaje adorable estilo chico pixel
        ctx.fillStyle = "#fdcc8a";
        ctx.fillRect(x-12, y-28, 24, 30);
        ctx.fillStyle = "#5e3a1f";
        ctx.fillRect(x-6, y-39, 12, 12);
        ctx.fillStyle = "#fff2df";
        ctx.fillRect(x-8, y-22, 7, 7);
        ctx.fillRect(x+1, y-22, 7, 7);
        ctx.fillStyle = "#1e2f3a";
        ctx.fillRect(x-7, y-20, 4, 4);
        ctx.fillRect(x+2, y-20, 4, 4);
        ctx.fillStyle = "#d9692e";
        ctx.fillRect(x-3, y-13, 6, 5);
        // gorra o moño
        ctx.fillStyle = "#c53a1f";
        ctx.fillRect(x-14, y-42, 28, 9);
        if (anim === "caminando") {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(x+8, y-20, 5, 5);
        }
    }

    // -------------------- INTERACCIONES --------------------
    function manejarClickCanvas(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clickX = (e.clientX - rect.left) * scaleX;
        const clickY = (e.clientY - rect.top) * scaleY;
        
        if (gameState.dia === 2) {
            for (let item of CASA_RECUERDOS) {
                if (clickX > item.x && clickX < item.x+item.w && clickY > item.y && clickY < item.y+item.h) {
                    if (!item.visitado) {
                        item.visitado = true;
                        gameState.casaVisitados++;
                        guardarPartida();
                        dialogDiv.innerHTML = item.mensaje.replace(/\n/g, '<br>');
                        actualizarUI();
                    } else {
                        dialogDiv.innerHTML = "💭 Ya reviviste ese recuerdo. Sigue explorando 💭";
                    }
                    return;
                }
            }
            dialogDiv.innerHTML = "🔍 Haz click en los objetos amarillos (librero, planta o cuadro) para descubrir poemas y fotos.";
            return;
        }
        
        if (gameState.dia === 3) {
            // interactuar con elementos de calle
            for (let calle of CALLE_RECUERDOS) {
                if (clickX > calle.x && clickX < calle.x+calle.w && clickY > calle.y && clickY < calle.y+calle.h) {
                    if (!calle.visitado) {
                        calle.visitado = true;
                        gameState.calleVisitados++;
                        guardarPartida();
                        dialogDiv.innerHTML = calle.mensaje.replace(/\n/g, '<br>');
                        actualizarUI();
                    } else {
                        dialogDiv.innerHTML = "🌿 Ese recuerdo ya lo atesoras. Busca la piedra para tu regalo.";
                    }
                    return;
                }
            }
            // Piedra de regalo
            if (!gameState.piedraRegaloTomado && clickX > 590 && clickX < 680 && clickY > 310 && clickY < 370) {
                gameState.piedraRegaloTomado = true;
                guardarPartida();
                dialogDiv.innerHTML = REGALO_PIEDRA.replace(/\n/g, '<br>');
                actualizarUI();
                return;
            }
            dialogDiv.innerHTML = "🌆 Toca los objetos azules o la piedra naranja para tu regalo.";
        }
    }

    function siguienteDia() {
        if (gameState.dia === 1 && !gameState.sorpresaHecha) {
            dialogDiv.innerHTML = "❓ Primero recibe la sorpresa del control (botón rojo 'No tengo un control').";
            return;
        }
        if (gameState.dia === 2 && gameState.casaVisitados < CASA_RECUERDOS.length) {
            dialogDiv.innerHTML = `🏠 Aún faltan recuerdos por ver (${gameState.casaVisitados}/${CASA_RECUERDOS.length}). Encuentra todos los objetos brillantes en casa.`;
            return;
        }
        if (gameState.dia === 3 && !gameState.piedraRegaloTomado) {
            dialogDiv.innerHTML = "⛰️ Debes reclamar el segundo regalo en la piedra de la esquina. ¡Haz click en ella!";
            return;
        }
        
        // Avanzar día
        if (gameState.dia === 1 && gameState.sorpresaHecha) {
            gameState.dia = 2;
            dialogDiv.innerHTML = "🌅 ¡Nuevo día! Ahora explora la casa, toca los objetos para encontrar poemas y fotos. ❤️";
            guardarPartida();
            actualizarUI();
            return;
        }
        if (gameState.dia === 2 && gameState.casaVisitados >= CASA_RECUERDOS.length) {
            gameState.dia = 3;
            dialogDiv.innerHTML = "🚪 Sales de casa... Mañana el destino es la esquina donde solían sentarse. ¡No olvides reclamar tu segundo regalo!";
            guardarPartida();
            actualizarUI();
            return;
        }
        if (gameState.dia === 3 && gameState.piedraRegaloTomado) {
            gameState.dia = 4;
            dialogDiv.innerHTML = "🎉 ¡HAS COMPLETADO LA AVENTURA! 🎉\nRecibirás todos los regalos con mucho amor. ¡Te quiero infinito! 💖";
            guardarPartida();
            actualizarUI();
        }
    }

    // Eventos
    canvas.addEventListener('click', manejarClickCanvas);
    document.getElementById('nextDayBtn').addEventListener('click', siguienteDia);
    document.getElementById('resetBtn').addEventListener('click', () => resetInterno(true));
    
    cargarPartida();
    dibujarEscena();
</script>
</body>
</html>
