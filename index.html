<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PokéAventura · Los regalos de tu amor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #1a2a1f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
        }

        .game-wrapper {
            background: #2e2b26;
            border-radius: 48px;
            padding: 16px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            display: inline-block;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            cursor: pointer;
            background-color: #c9dbb2;
            width: 100%;
            height: auto;
            max-width: 900px;
            aspect-ratio: 900 / 550;
        }

        .info-panel {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fcf3da;
            border-radius: 40px;
            padding: 12px 20px;
            border: 2px solid #c9a96b;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge {
            background: #2c2b26;
            color: #ffdf8c;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
            white-space: nowrap;
        }

        .dialog {
            flex: 1;
            font-size: 13px;
            font-weight: bold;
            color: #3a2a1f;
            background: #fff3e0;
            padding: 8px 16px;
            border-radius: 30px;
            font-family: monospace;
            min-width: 150px;
        }

        .touch-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .ctrl-btn {
            background: #3a3a3a;
            border: none;
            font-size: 28px;
            padding: 12px 20px;
            border-radius: 60px;
            color: white;
            box-shadow: 0 5px 0 #1a1a1a;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
            font-weight: bold;
            min-width: 70px;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1a1a1a;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .pixel-btn {
            background: #f5bc70;
            border: none;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b46f2a;
            transition: 0.05s linear;
        }

        .pixel-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b46f2a;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            font-family: monospace;
        }
        .modal-content {
            background: #fff3cf;
            max-width: 80%;
            padding: 24px;
            border-radius: 32px;
            border: 4px solid #ffcd7e;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            color: #2c2b1f;
            white-space: pre-line;
        }
        .modal-content button {
            margin-top: 20px;
            background: #6fcf97;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .fullscreen canvas {
            max-width: 100vw;
            max-height: 100vh;
            border-radius: 0;
        }
        .fullscreen .touch-controls,
        .fullscreen .info-panel,
        .fullscreen .action-buttons {
            display: none;
        }
        .fullscreen .game-wrapper {
            background: transparent;
            padding: 0;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="gameWrapper">
    <div class="canvas-container">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
    </div>
    <div class="info-panel">
        <div class="badge" id="dayBadge">📅 DÍA 1</div>
        <div class="dialog" id="dialogBox">✨ Acércate a los objetos ✨</div>
        <div class="badge" id="giftBadge">🎁 REGALO: ?</div>
    </div>
    <div class="touch-controls" id="touchControls">
        <button class="ctrl-btn" id="btnUp">▲</button>
        <button class="ctrl-btn" id="btnLeft">◀</button>
        <button class="ctrl-btn" id="btnDown">▼</button>
        <button class="ctrl-btn" id="btnRight">▶</button>
    </div>
    <div class="action-buttons">
        <button class="pixel-btn" id="resetBtn">🔁 REINICIAR</button>
        <button class="pixel-btn" id="nextDayBtn">🌙 PASAR DÍA</button>
        <button class="pixel-btn" id="controlConnectedBtn">🎮 CONTROL CONECTADO</button>
    </div>
</div>

<script>
    // ==========================================================
    //  JUEGO CON GRÁFICOS DIBUJADOS POR CÓDIGO (NO IMÁGENES EXTERNAS)
    //  Estilo cartoon / cuento ilustrado - sin rectángulos feos
    // ==========================================================
    
    // Configuración de escenas con objetos interactivos
    const ESCENAS = {
        1: {   // Día 1: habitación
            objetos: [
                { nombre: "💬 Mensaje del juego", x: 450, y: 400, radio: 55,
                  mensaje: "⚠️ ¡Para una mejor experiencia, conecta tu control! ⚠️\n(Usa el botón azul 'Control conectado' para simularlo)" }
            ],
            personajeInicio: { x: 450, y: 480 },
            drawFondo: drawBedroom
        },
        2: {   // Día 2: sala de estar
            objetos: [
                { nombre: "📚 Estante de libros", x: 180, y: 280, radio: 60,
                  mensaje: "📜 Poema: 'Tus manos abren cada libro de mi vida'.\n🖼️ Foto: ustedes leyendo juntos." },
                { nombre: "🌿 Planta verde", x: 720, y: 420, radio: 55,
                  mensaje: "🌱 'Como esta planta, nuestro amor florece cada día'.\n📸 Recuerdo: regando la maceta." },
                { nombre: "🖼️ Cuadro familiar", x: 500, y: 180, radio: 50,
                  mensaje: "🖼️ Nuestra primera foto. ¡Qué felices!\n💌 Te quiero más cada día." }
            ],
            personajeInicio: { x: 450, y: 500 },
            drawFondo: drawLivingRoom
        },
        3: {   // Día 3: calle + esquina
            objetos: [
                { nombre: "🌳 Árbol", x: 160, y: 380, radio: 65,
                  mensaje: "🍃 Poema: 'Bajo este árbol contamos secretos al viento'.\n📸 Foto: sentados en la piedra." },
                { nombre: "💡 Farol", x: 760, y: 290, radio: 55,
                  mensaje: "🏮 'Cada tarde te esperaba aquí, farol testigo de nuestro amor'." },
                { nombre: "⭐ Piedra del regalo", x: 450, y: 490, radio: 60,
                  mensaje: "🎁 ¡SEGUNDO REGALO! 🎁\nUna BEYBLADE + funda para tablet.\n💝 ¡Felicidades, amor!" }
            ],
            personajeInicio: { x: 450, y: 520 },
            drawFondo: drawStreet
        }
    };
    
    // Estado del juego
    let currentDay = 1;
    let player = { x: 450, y: 480 };
    let surpriseDone = false;
    let objetosVisitados = { 2: [], 3: [] };
    let controlConnected = false;
    let activeModal = null;
    
    // Movimiento
    let moveLeft = false, moveRight = false, moveUp = false, moveDown = false;
    
    // Canvas
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Elementos DOM
    const dayBadge = document.getElementById('dayBadge');
    const giftBadge = document.getElementById('giftBadge');
    const dialogBox = document.getElementById('dialogBox');
    const touchControlsDiv = document.getElementById('touchControls');
    const gameWrapper = document.getElementById('gameWrapper');
    
    // ---------- FUNCIONES DE DIBUJO DE FONDOS (estilo cartoon) ----------
    function drawBedroom() {
        // Pared y suelo
        const gradWall = ctx.createLinearGradient(0, 0, 0, 300);
        gradWall.addColorStop(0, "#f7e5c2");
        gradWall.addColorStop(1, "#e6cf9e");
        ctx.fillStyle = gradWall;
        ctx.fillRect(0, 0, 900, 400);
        ctx.fillStyle = "#b87c4f";
        ctx.fillRect(0, 380, 900, 170);
        // ventana
        ctx.fillStyle = "#aad0d6";
        ctx.shadowBlur = 4;
        ctx.fillRect(680, 60, 140, 140);
        ctx.fillStyle = "#f9f3d9";
        ctx.fillRect(690, 70, 120, 120);
        ctx.fillStyle = "#7c5e3a";
        for(let i=0;i<3;i++) ctx.fillRect(690 + i*40, 70, 8, 120);
        ctx.fillStyle = "#ffd966";
        ctx.beginPath();
        ctx.arc(750, 130, 25, 0, Math.PI*2);
        ctx.fill();
        // cama
        ctx.fillStyle = "#c28b5c";
        ctx.beginPath();
        ctx.roundRect(200, 280, 260, 130, 20);
        ctx.fill();
        ctx.fillStyle = "#f0cca6";
        ctx.beginPath();
        ctx.roundRect(220, 260, 220, 35, 15);
        ctx.fill();
        ctx.fillStyle = "#e3b87c";
        ctx.fillRect(230, 300, 100, 50);
        // mesita
        ctx.fillStyle = "#a57348";
        ctx.fillRect(100, 420, 70, 50);
        ctx.fillStyle = "#d6a15a";
        ctx.beginPath();
        ctx.arc(135, 415, 20, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    function drawLivingRoom() {
        // pared y suelo
        ctx.fillStyle = "#efdfb7";
        ctx.fillRect(0, 0, 900, 360);
        ctx.fillStyle = "#c29a6b";
        ctx.fillRect(0, 340, 900, 210);
        // sofá
        ctx.fillStyle = "#7fa56e";
        ctx.beginPath();
        ctx.roundRect(60, 240, 220, 110, 25);
        ctx.fill();
        ctx.fillStyle = "#5e8b4c";
        ctx.fillRect(80, 260, 180, 70);
        // estantería
        ctx.fillStyle = "#b58c5a";
        ctx.fillRect(680, 160, 120, 230);
        for(let i=0;i<4;i++) ctx.fillStyle = "#8b6942", ctx.fillRect(690, 180+i*50, 100, 8);
        // cuadro
        ctx.fillStyle = "#e5c69e";
        ctx.fillRect(400, 100, 120, 90);
        ctx.fillStyle = "#4a6b3c";
        ctx.fillRect(420, 120, 80, 50);
        // lámpara
        ctx.fillStyle = "#dbb45c";
        ctx.beginPath();
        ctx.moveTo(300, 180);
        ctx.lineTo(330, 240);
        ctx.lineTo(270, 240);
        ctx.fill();
    }
    
    function drawStreet() {
        // cielo
        const gradSky = ctx.createLinearGradient(0, 0, 0, 300);
        gradSky.addColorStop(0, "#b2d8e8");
        gradSky.addColorStop(1, "#f0d89e");
        ctx.fillStyle = gradSky;
        ctx.fillRect(0, 0, 900, 320);
        // suelo
        ctx.fillStyle = "#8cb06b";
        ctx.fillRect(0, 300, 900, 250);
        ctx.fillStyle = "#c7a86b";
        ctx.fillRect(0, 330, 900, 40);
        // árbol
        ctx.fillStyle = "#6d4c2c";
        ctx.fillRect(120, 260, 30, 120);
        ctx.fillStyle = "#5b8c4e";
        ctx.beginPath();
        ctx.arc(135, 240, 45, 0, Math.PI*2);
        ctx.fill();
        // farol
        ctx.fillStyle = "#5a5a5a";
        ctx.fillRect(730, 220, 12, 140);
        ctx.fillStyle = "#ffd966";
        ctx.beginPath();
        ctx.arc(736, 215, 18, 0, Math.PI*2);
        ctx.fill();
        // piedra (esquina)
        ctx.fillStyle = "#9c8468";
        ctx.beginPath();
        ctx.ellipse(450, 470, 45, 25, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#ccaa77";
        ctx.beginPath();
        ctx.ellipse(450, 465, 35, 18, 0, 0, Math.PI*2);
        ctx.fill();
    }
    
    // Dibujar personaje estilo "aventurero"
    function drawCharacter(x, y) {
        ctx.save();
        ctx.shadowBlur = 0;
        // cuerpo
        ctx.fillStyle = "#4a90e2";
        ctx.beginPath();
        ctx.roundRect(x-15, y-35, 30, 45, 12);
        ctx.fill();
        // cabeza
        ctx.fillStyle = "#fdd7a8";
        ctx.beginPath();
        ctx.arc(x, y-28, 18, 0, Math.PI*2);
        ctx.fill();
        // ojos
        ctx.fillStyle = "#2c2e3a";
        ctx.beginPath();
        ctx.arc(x-7, y-33, 3, 0, Math.PI*2);
        ctx.arc(x+7, y-33, 3, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(x-8, y-34, 1, 0, Math.PI*2);
        ctx.arc(x+6, y-34, 1, 0, Math.PI*2);
        ctx.fill();
        // sonrisa
        ctx.beginPath();
        ctx.arc(x, y-25, 8, 0.1, Math.PI - 0.1);
        ctx.strokeStyle = "#6b3e1a";
        ctx.lineWidth = 2;
        ctx.stroke();
        // gorra
        ctx.fillStyle = "#d93929";
        ctx.beginPath();
        ctx.ellipse(x, y-45, 16, 8, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#b52b1c";
        ctx.fillRect(x-12, y-47, 24, 6);
        ctx.restore();
    }
    
    // Dibujar círculos de interacción
    function drawInteractables() {
        if (!ESCENAS[currentDay]) return;
        for (let obj of ESCENAS[currentDay].objetos) {
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, obj.radio, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255, 220, 100, 0.3)";
            ctx.fill();
            ctx.strokeStyle = "#ffb347";
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.font = "bold 13px monospace";
            ctx.fillStyle = "#2c2b26";
            ctx.shadowBlur = 2;
            ctx.fillText(obj.nombre, obj.x-30, obj.y-15);
            ctx.shadowBlur = 0;
        }
    }
    
    function draw() {
        // Limpiar
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Dibujar fondo según escena
        if (ESCENAS[currentDay] && ESCENAS[currentDay].drawFondo) {
            ESCENAS[currentDay].drawFondo();
        } else {
            ctx.fillStyle = "#c9dbb2";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        // Dibujar objetos interactivos
        drawInteractables();
        // Dibujar personaje
        drawCharacter(player.x, player.y);
        // Indicador de control conectado
        if (controlConnected) {
            ctx.font = "bold 16px monospace";
            ctx.fillStyle = "#00cc99";
            ctx.shadowBlur = 0;
            ctx.fillText("🎮 CONTROL CONECTADO", 20, 50);
        }
    }
    
    // Detectar objeto cercano
    function getNearbyObject() {
        if (!ESCENAS[currentDay]) return null;
        for (let obj of ESCENAS[currentDay].objetos) {
            const dx = player.x - obj.x;
            const dy = player.y - obj.y;
            if (Math.hypot(dx, dy) < obj.radio) return obj;
        }
        return null;
    }
    
    // Mostrar pop-up
    function showModal(text, onClose) {
        if (activeModal) activeModal.remove();
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <p>${text.replace(/\n/g, '<br>')}</p>
                <button id="closeModalBtn">Cerrar</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        activeModal = modalDiv;
        document.getElementById('closeModalBtn').onclick = () => {
            modalDiv.remove();
            activeModal = null;
            if (onClose) onClose();
        };
    }
    
    // Manejar clic en canvas (interacción)
    function handleCanvasClick() {
        const nearby = getNearbyObject();
        if (!nearby) {
            dialogBox.innerText = "Acércate a un objeto brillante (círculo dorado).";
            return;
        }
        // Día 1: mensaje del control
        if (currentDay === 1 && !surpriseDone) {
            showModal("🎮 ¡SORPRESA! 🎮\n\nMira a tu lado: ¡aquí está tu control 8bitdo!\n(Entrégaselo en la vida real)\n\nAhora puedes usar el botón 'Control conectado' para pantalla completa.", () => {
                surpriseDone = true;
                saveGame();
                updateUI();
                draw();
            });
            return;
        }
        // Días 2 y 3: mostrar poema / regalo
        if (currentDay === 2 || currentDay === 3) {
            const yaVisto = objetosVisitados[currentDay]?.includes(nearby.nombre);
            if (!yaVisto) {
                objetosVisitados[currentDay].push(nearby.nombre);
                saveGame();
            }
            showModal(nearby.mensaje, null);
            updateUI();
            draw();
        }
    }
    
    // Movimiento
    function updateMovement() {
        let newX = player.x;
        let newY = player.y;
        const speed = 3.8;
        if (moveLeft) newX -= speed;
        if (moveRight) newX += speed;
        if (moveUp) newY -= speed;
        if (moveDown) newY += speed;
        player.x = Math.min(Math.max(newX, 40), canvas.width - 40);
        player.y = Math.min(Math.max(newY, 50), canvas.height - 50);
        draw();
        updateUI();
    }
    
    function updateUI() {
        dayBadge.innerText = `📅 DÍA ${currentDay}`;
        if (currentDay === 1 && !surpriseDone) giftBadge.innerText = "🎁 CONTROL SORPRESA";
        else if (currentDay === 2) giftBadge.innerText = `🏠 Recuerdos: ${objetosVisitados[2]?.length || 0}/${ESCENAS[2].objetos.length}`;
        else if (currentDay === 3) giftBadge.innerText = objetosVisitados[3]?.includes("⭐ Piedra del regalo") ? "⭐ REGALO OBTENIDO" : "⭐ Busca la piedra";
        else giftBadge.innerText = "✨ Completado ✨";
        
        const near = getNearbyObject();
        if (near && currentDay === 1 && !surpriseDone) dialogBox.innerText = `🔍 Cerca: ${near.nombre}. ¡Tócalo!`;
        else if (near && currentDay !== 1) dialogBox.innerText = `🔍 Cerca: ${near.nombre}. Toca para tu recuerdo.`;
        else dialogBox.innerText = "💬 Muévete con las flechas y acércate a los círculos dorados.";
    }
    
    // Avanzar día
    function nextDay() {
        if (currentDay === 1 && !surpriseDone) {
            showModal("Primero recibe la sorpresa del control (acércate al mensaje y tócalo).", null);
            return;
        }
        if (currentDay === 2 && (objetosVisitados[2]?.length || 0) < ESCENAS[2].objetos.length) {
            showModal(`Aún faltan ${ESCENAS[2].objetos.length - (objetosVisitados[2]?.length || 0)} recuerdos. Explora la casa.`, null);
            return;
        }
        if (currentDay === 3 && !objetosVisitados[3]?.includes("⭐ Piedra del regalo")) {
            showModal("Debes reclamar el segundo regalo en la piedra de la esquina.", null);
            return;
        }
        
        if (currentDay === 1 && surpriseDone) {
            currentDay = 2;
            player = { ...ESCENAS[2].personajeInicio };
            saveGame();
            showModal("🌅 ¡Día 2! Ahora explora tu casa. Acércate a los objetos para descubrir poemas y fotos.", null);
        } else if (currentDay === 2 && (objetosVisitados[2]?.length || 0) >= ESCENAS[2].objetos.length) {
            currentDay = 3;
            player = { ...ESCENAS[3].personajeInicio };
            saveGame();
            showModal("🚪 Sales de casa. Llegarás a la esquina donde solían sentarse. Busca la piedra para tu segundo regalo.", null);
        } else if (currentDay === 3 && objetosVisitados[3]?.includes("⭐ Piedra del regalo")) {
            showModal("🎉 ¡FELICIDADES! Has completado todos los regalos. 🎉\nGracias por jugar. ¡Te quiero muchísimo!", null);
        }
        updateUI();
        draw();
    }
    
    // Control conectado: pantalla completa + ocultar botones
    function enableControlMode() {
        controlConnected = true;
        touchControlsDiv.style.display = "none";
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }
        gameWrapper.classList.add('fullscreen');
        dialogBox.innerText = "🎮 Modo control activado. ¡Disfruta!";
        draw();
    }
    
    // Guardado
    function saveGame() {
        const save = { currentDay, surpriseDone, objetosVisitados, playerPos: { x: player.x, y: player.y } };
        localStorage.setItem('pokemonAmorSave', JSON.stringify(save));
    }
    
    function loadGame() {
        const data = localStorage.getItem('pokemonAmorSave');
        if (data) {
            const saved = JSON.parse(data);
            currentDay = saved.currentDay;
            surpriseDone = saved.surpriseDone;
            objetosVisitados = saved.objetosVisitados || { 2: [], 3: [] };
            if (saved.playerPos) player = saved.playerPos;
        } else {
            currentDay = 1;
            player = { ...ESCENAS[1].personajeInicio };
        }
        updateUI();
        draw();
    }
    
    function resetGame() {
        localStorage.removeItem('pokemonAmorSave');
        currentDay = 1;
        surpriseDone = false;
        objetosVisitados = { 2: [], 3: [] };
        controlConnected = false;
        touchControlsDiv.style.display = "flex";
        gameWrapper.classList.remove('fullscreen');
        if (document.fullscreenElement) document.exitFullscreen();
        player = { ...ESCENAS[1].personajeInicio };
        updateUI();
        draw();
    }
    
    // Eventos de movimiento
    function attachControls() {
        const addEvent = (id, dir) => {
            const btn = document.getElementById(id);
            btn.addEventListener('mousedown', () => { move[dir] = true; });
            btn.addEventListener('mouseup', () => { move[dir] = false; });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); move[dir] = true; });
            btn.addEventListener('touchend', () => { move[dir] = false; });
        };
        const move = { up: false, down: false, left: false, right: false };
        moveUp = () => move.up; moveDown = () => move.down; moveLeft = () => move.left; moveRight = () => move.right;
        window.moveUp = move.up; window.moveDown = move.down; window.moveLeft = move.left; window.moveRight = move.right;
        addEvent('btnUp', 'up'); addEvent('btnDown', 'down'); addEvent('btnLeft', 'left'); addEvent('btnRight', 'right');
        setInterval(() => {
            let nx = player.x, ny = player.y;
            if (move.up) ny -= 3.8;
            if (move.down) ny += 3.8;
            if (move.left) nx -= 3.8;
            if (move.right) nx += 3.8;
            player.x = Math.min(Math.max(nx, 40), canvas.width - 40);
            player.y = Math.min(Math.max(ny, 50), canvas.height - 50);
            draw();
            updateUI();
        }, 25);
    }
    
    // Inicializar
    canvas.addEventListener('click', handleCanvasClick);
    document.getElementById('resetBtn').addEventListener('click', resetGame);
    document.getElementById('nextDayBtn').addEventListener('click', nextDay);
    document.getElementById('controlConnectedBtn').addEventListener('click', enableControlMode);
    attachControls();
    loadGame();
    draw();
    
    // Helper roundRect
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x+r, y);
            this.lineTo(x+w-r, y);
            this.quadraticCurveTo(x+w, y, x+w, y+r);
            this.lineTo(x+w, y+h-r);
            this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
            this.lineTo(x+r, y+h);
            this.quadraticCurveTo(x, y+h, x, y+h-r);
            this.lineTo(x, y+r);
            this.quadraticCurveTo(x, y, x+r, y);
            return this;
        };
    }
</script>
